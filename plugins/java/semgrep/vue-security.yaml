rules:
  # ============================================
  # Vue 安全规则
  # ============================================
  
  # ============================================
  # P0 - v-html XSS
  # ============================================
  
  - id: vue-xss-v-html
    patterns:
      - pattern-regex: 'v-html\s*=\s*["\']?[^"\'>]*["\']?'
    paths:
      include:
        - "*.vue"
        - "*.js"
        - "*.ts"
    message: "检测到 v-html 指令。直接渲染 HTML 内容可能导致 XSS 攻击。建议避免使用 v-html，或确保内容经过严格消毒（使用 DOMPurify 等库）。"
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: security
      cwe: "CWE-79"
      owasp: "A03:2021 - Injection"
  
  - id: vue-xss-v-html-userInput
    patterns:
      - pattern-regex: 'v-html\s*=\s*["\']?(?:userInput|input|data|props|query|params|req|res|location)'
    paths:
      include:
        - "*.vue"
    message: "检测到 v-html 直接使用用户输入。高危 XSS 漏洞！建议使用 DOMPurify 消毒后再渲染。"
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: security
      cwe: "CWE-79"
  
  # ============================================
  # P1 - 模板注入
  # ============================================
  
  - id: vue-template-injection-dynamic
    patterns:
      - pattern-regex: 'template\s*:\s*["\'][^"\']*(?:props|data|params|query|location)'
    paths:
      include:
        - "*.vue"
        - "*.js"
        - "*.ts"
    message: "检测到动态模板。可能导致模板注入攻击。建议避免动态生成模板内容。"
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: security
      cwe: "CWE-94"
  
  - id: vue-template-injection-render
    patterns:
      - pattern-regex: 'render\s*:\s*function|render\s*:\s*\(|\$createElement'
    paths:
      include:
        - "*.vue"
        - "*.js"
    message: "检测到 render 函数。手动渲染可能导致 XSS。建议确保 createElement 的内容安全。"
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      category: security
      cwe: "CWE-79"
  
  # ============================================
  # P1 - 不安全的组件渲染
  # ============================================
  
  - id: vue-insecure-component-dynamic
    patterns:
      - pattern-regex: '<component\s+:is\s*=\s*["\']?(?:props|data|params|query|location)'
    paths:
      include:
        - "*.vue"
    message: "检测到动态组件 :is 使用用户输入。可能导致渲染恶意组件。建议限制动态组件的范围。"
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      category: security
      cwe: "CWE-79"
  
  # ============================================
  # P1 - href 注入
  # ============================================
  
  - id: vue-xss-href-injection
    patterns:
      - pattern-regex: ':href\s*=\s*["\']?(?:userInput|input|data|props|query|params|location)'
    paths:
      include:
        - "*.vue"
    message: "检测到 :href 使用用户输入。可能导致 XSS 或开放重定向。建议验证 URL 格式，使用白名单限制跳转目标。"
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      category: security
      cwe: "CWE-79"
  
  - id: vue-xss-javascript-href
    patterns:
      - pattern-regex: ':href\s*=\s*["\']?javascript:'
    paths:
      include:
        - "*.vue"
    message: "检测到 javascript: 协议的 href。可能导致 XSS 攻击。建议避免使用 javascript: 协议。"
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: security
      cwe: "CWE-79"
  
  # ============================================
  # P1 - 不安全的 URL 跳转
  # ============================================
  
  - id: vue-open-redirect-router-push
    patterns:
      - pattern-regex: 'router\.push\s*\(\s*(?:userInput|input|data|props|query|params|location)'
    paths:
      include:
        - "*.vue"
        - "*.js"
        - "*.ts"
    message: "检测到 router.push 使用用户输入。可能导致开放重定向攻击。建议验证和限制跳转目标 URL。"
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      category: security
      cwe: "CWE-601"
  
  - id: vue-open-redirect-window-location
    patterns:
      - pattern-regex: 'window\.location\s*=\s*(?:userInput|input|data|props|query|params|location)'
    paths:
      include:
        - "*.vue"
        - "*.js"
        - "*.ts"
    message: "检测到 window.location 赋值使用用户输入。可能导致开放重定向。建议验证跳转目标。"
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      category: security
      cwe: "CWE-601"
  
  # ============================================
  # P2 - 敏感信息泄露
  # ============================================
  
  - id: vue-info-leak-console-data
    patterns:
      - pattern-regex: 'console\.log\s*\(\s*(?:this\.data|data|props|this\.props)'
    paths:
      include:
        - "*.vue"
        - "*.js"
    message: "检测到 console.log 输出 data 或 props。可能导致敏感信息泄露。建议移除生产环境中的调试日志。"
    severity: INFO
    languages: [javascript, typescript]
    metadata:
      category: security
      cwe: "CWE-532"
  
  - id: vue-info-leak-v-bind-attr
    patterns:
      - pattern-regex: 'v-bind\s*=\s*\{[^}]*(?:password|token|secret|key|credential)'
    paths:
      include:
        - "*.vue"
    message: "检测到 v-bind 绑定敏感信息。可能导致敏感信息泄露到 DOM 属性。建议谨慎处理敏感数据的绑定。"
    severity: INFO
    languages: [javascript, typescript]
    metadata:
      category: security
      cwe: "CWE-200"
  
  # ============================================
  # P2 - 不安全的 computed 属性
  # ============================================
  
  - id: vue-computed-sensitive
    patterns:
      - pattern-regex: 'computed\s*:\s*\{[^}]*(?:password|token|secret|key|credential)'
    paths:
      include:
        - "*.vue"
        - "*.js"
    message: "检测到 computed 属性包含敏感信息。可能导致敏感信息泄露。建议避免在 computed 中暴露敏感数据。"
    severity: INFO
    languages: [javascript, typescript]
    metadata:
      category: security
      cwe: "CWE-200"
  
  # ============================================
  # P2 - 不安全的 watch
  # ============================================
  
  - id: vue-watch-sensitive
    patterns:
      - pattern-regex: 'watch\s*:\s*\{[^}]*(?:password|token|secret|key|credential)'
    paths:
      include:
        - "*.vue"
        - "*.js"
    message: "检测到 watch 监听敏感信息。可能导致敏感信息泄露到日志或控制台。建议谨慎处理敏感数据的监听。"
    severity: INFO
    languages: [javascript, typescript]
    metadata:
      category: security
      cwe: "CWE-200"
  
  # ============================================
  # P2 - 不安全的生命周期钩子
  # ============================================
  
  - id: vue-lifecycle-mounted-dangerous
    patterns:
      - pattern-regex: 'mounted\s*\(\s*\)\s*\{[^}]*(?:innerHTML|outerHTML|document\.write|eval)'
    paths:
      include:
        - "*.vue"
        - "*.js"
    message: "检测到 mounted 钩子中使用危险 DOM 操作。可能导致 XSS。建议使用 Vue 的模板语法替代直接 DOM 操作。"
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      category: security
      cwe: "CWE-79"
  
  # ============================================
  # P2 - 不安全的 Vuex 状态管理
  # ============================================
  
  - id: vue-vuex-sensitive-state
    patterns:
      - pattern-regex: 'state\s*:\s*\{[^}]*(?:password|token|secret|key|credential)'
    paths:
      include:
        - "*.js"
        - "*.ts"
        - "*.vue"
    message: "检测到 Vuex state 存储敏感信息。可能导致敏感信息泄露。建议使用加密存储或避免在前端存储敏感数据。"
    severity: INFO
    languages: [javascript, typescript]
    metadata:
      category: security
      cwe: "CWE-922"
  
  # ============================================
  # P2 - 不安全的 mixin
  # ============================================
  
  - id: vue-mixin-dangerous
    patterns:
      - pattern-regex: 'mixins\s*:\s*\[[^\]]*(?:innerHTML|outerHTML|document\.write|eval)'
    paths:
      include:
        - "*.vue"
        - "*.js"
    message: "检测到 mixin 包含危险操作。可能导致 XSS。建议检查 mixin 内容的安全性。"
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      category: security
      cwe: "CWE-79"
  
  # ============================================
  # P2 - 不安全的第三方库
  # ============================================
  
  - id: vue-lib-vue-old-version
    patterns:
      - pattern-regex: 'vue@[0-2]\.'
    paths:
      include:
        - "package.json"
    message: "检测到旧版本 Vue (< 3.0.0)。Vue 2.x 存在一些已知安全问题。建议升级到 Vue 3.x+。"
    severity: INFO
    languages: [json]
    metadata:
      category: security
      cwe: "CWE-937"
  
  - id: vue-lib-vue-router-old
    patterns:
      - pattern-regex: 'vue-router@[0-3]\.'
    paths:
      include:
        - "package.json"
    message: "检测到旧版本 vue-router (< 4.0.0)。建议升级到 vue-router 4.x+。"
    severity: INFO
    languages: [json]
    metadata:
      category: security
      cwe: "CWE-937"